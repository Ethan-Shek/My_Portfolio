<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects</title>
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Modak&display=swap" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
    rel="stylesheet">
  <style>
    /* Page-specific content styling layered on top of pond */
    .project-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.1);
      border: 3px solid rgba(255, 255, 255, 0.4);
      border-radius: 25px;
      padding: 40px;
      width: 80%;
      max-width: 950px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(6px);
      z-index: 5;
      /* Above lily pads */
      color: #fff;
      text-align: center;
    }

    .h1-base {
      position: relative;
      z-index: 2;
      font-family: 'Modak', cursive;
      font-size: 7rem;
      color: #D1232A;
      left: 35rem;
      top: -3.4rem;
      margin-bottom: 1rem;
      letter-spacing: 0;
      font-weight: 400;
      text-shadow: none;
    }

    .h1-top {
      position: absolute;
      /* Layer on top of h1 */
      top: -3.4rem;
      left: 34.6rem;
      z-index: 3;
      font-family: 'Modak', cursive;
      font-size: 7rem;
      letter-spacing: 0;
      font-weight: 400;
      color: #fff;
      pointer-events: none;
    }

    p {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 1.3rem;
      line-height: 2rem;
      margin-top: 0rem;
      margin-bottom: 2rem;
    }

    .h2-top {
      z-index: 1;
      position: relative;
      font-family: 'Modak', cursive;
      font-size: 2.3rem;
      line-height: 1.2rem;
      margin-bottom: 1.2rem;
      font-weight: 400;
      text-decoration: underline;
      color: #fff;
    }

    .h2-base {
      position: absolute;
      left: 15.5rem;
      transform: translateY(-2rem);
      z-index: 1;
      font-family: 'Modak', cursive;
      font-size: 2.3rem;
      line-height: 1.2rem;
      margin-bottom: 1.2rem;
      font-weight: 400;
      text-decoration: underline;
      color: #D1232A;
    }

    .h3-top {
      z-index: 1;
      position: relative;
      font-family: 'Modak', cursive;
      font-size: 2.3rem;
      line-height: 1.2rem;
      margin-bottom: 1.2rem;
      font-weight: 400;
      text-decoration: underline;
      color: #fff;
    }

    .h3-base {
      position: absolute;
      left: 23.9rem;
      transform: translateY(-2rem);
      z-index: 0;
      font-family: 'Modak', cursive;
      font-size: 2.3rem;
      line-height: 1.2rem;
      margin-bottom: 1.2rem;
      font-weight: 400;
      text-decoration: underline;
      color: #D1232A;
    }

    .h4-top {
      z-index: 1;
      position: relative;
      font-family: 'Modak', cursive;
      font-size: 2.3rem;
      line-height: 1.2rem;
      margin-bottom: 1.2rem;
      font-weight: 400;
      text-decoration: underline;
      color: #fff;
    }

    .h4-base {
      position: absolute;
      left: 27rem;
      transform: translateY(-2rem);
      z-index: 0;
      font-family: 'Modak', cursive;
      font-size: 2.3rem;
      line-height: 1.2rem;
      margin-bottom: 1.2rem;
      font-weight: 400;
      text-decoration: underline;
      color: #D1232A;
    }

    .log-image {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.05, 0.5);
      z-index: 2;
      pointer-events: none;
      overflow: visible;
    }

    .back-button {
      position: absolute;
      top: 0.6rem;
      left: 1rem;
      padding: 1rem 3rem;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 1.5rem;
      text-decoration: none;
      color: #fff;
      background-color: rgba(0, 0, 0, 0.3);
      border: 2px solid #fff;
      border-radius: 40px;
      transition: all 0.3s ease;
      z-index: 10;
    }

    .koi-canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
      display: block;
      pointer-events: auto; 
    }

    .back-button:hover {
      background-color: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="pond-container">
    <canvas id="koiCanvas" class="koi-canvas"></canvas>
    <div class="blue-tint"></div>

    <img src="../images/log_adobestock.png" alt="Log png" class="log-image" />
    <h1 class="h1-base">Projects</h1>
    <h1 class="h1-top">Projects</h1>

    <a href="../index.html" class="back-button">⬅️ Back to Pond</a>

  </div>

  <script type="module" src="../scripts/projects.js"></script>
</body>

</html>
